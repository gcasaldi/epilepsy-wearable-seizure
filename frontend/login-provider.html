<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accesso Ente - Epilessia Platform</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body data-page="login-provider" class="page">
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="brand">🧠 Epilessia Platform</a>
      <nav class="nav">
        <a href="/app" class="nav-link">Scarica app</a>
        <a href="/login" class="nav-link" data-nav-login>Accedi</a>
        <button class="btn btn-secondary hidden" data-nav-logout>Esci</button>
        <span class="nav-link hidden" data-user-badge></span>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-head">
      <h1>Accesso Ente Sanitario</h1>
      <p class="muted">Accesso consentito solo a enti sanitari verificati. Se non verificato: stato pending.</p>
    </section>

    <section class="grid-2">
      <article class="card">
        <h3>Google OIDC / SSO</h3>
        <div id="googleProviderButton" class="google-box"></div>
      </article>
      <article class="card">
        <h3>Accesso riservato demo</h3>
        <form id="providerLocalLoginForm">
          <label>Email
            <input id="providerUsername" class="input" type="text" required>
          </label>
          <label>Password
            <input id="providerPassword" class="input" type="password" required>
          </label>
          <button type="submit" class="btn btn-primary">Accedi Ente</button>
        </form>
      </article>
    </section>

    <div id="providerLoginError" class="alert"></div>
  </main>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="/static/web.js"></script>
</body>
</html>
