<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Ente - Epiguard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body data-page="login-provider" class="page">
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="brand">Epiguard</a>
      <nav class="nav">
        <a href="/" class="nav-link">Home</a>
        <a href="/login" class="nav-link">Login Paziente</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-head">
      <h1>Accesso Ente Sanitario</h1>
      <p class="muted">Per struttura verificata o account demo provider.</p>
    </section>

    <section class="grid-2">
      <article class="card">
        <h3>Google Sign-In Ente</h3>
        <p class="muted">Usa email istituzionale per la verifica organizzazione.</p>
        <div id="googleProviderButton" style="display: inline-block; margin: 1rem 0;"></div>
        <p id="providerLoginError" class="muted"></p>
      </article>

      <article class="card">
        <h3>Login locale (demo)</h3>
        <p class="muted">Solo sviluppo/test.</p>
        <form id="providerLocalLoginForm">
          <label for="providerUsername">Username</label>
          <input id="providerUsername" type="text" required>
          <label for="providerPassword">Password</label>
          <input id="providerPassword" type="password" required>
          <button type="submit" class="btn">Accedi</button>
        </form>
      </article>
    </section>
  </main>

  <script src="web.js"></script>
</body>
</html>
