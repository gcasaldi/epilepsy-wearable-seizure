<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Mia Terapia - Epiguard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="therapy" class="page">
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="brand">Epiguard</a>
      <nav class="nav">
        <a href="/dashboard" class="nav-link">Dashboard</a>
        <a href="/therapy" class="nav-link">Terapia</a>
        <a href="/settings" class="nav-link">Impostazioni</a>
        <a href="/login" class="nav-link" data-nav-login>Accedi</a>
        <button class="btn btn-secondary hidden" data-nav-logout>Esci</button>
        <span class="nav-link hidden" data-user-badge></span>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-head">
      <h1>Terapia paziente</h1>
      <p class="muted">Aggiungi uno o piu` farmaci e gestisci il piano giornaliero.</p>
    </section>

    <section class="grid-2 section">
      <article class="card">
        <h3>Aggiungi Farmaco</h3>
        <form id="add-medication-form" class="demo-form">
          <label for="medication-name">Nome Farmaco</label>
          <input type="text" id="medication-name" class="form-control" required>

          <label for="medication-dosage">Dosaggio (es. 6mg)</label>
          <input type="text" id="medication-dosage" class="form-control">

          <label for="medication-time">Orario Assunzione</label>
          <input type="time" id="medication-time" class="form-control">

          <button type="submit" class="btn btn-primary">Aggiungi</button>
        </form>
      </article>

      <article class="card">
        <h3>I tuoi farmaci</h3>
        <div id="medications" class="demo-form"></div>
      </article>
    </section>
  </main>

  <script src="web.js"></script>
</body>
</html>
