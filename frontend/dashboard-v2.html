<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Avanzata - Epiguard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-page="dashboard-v2" class="page">
  <header>
    <h1>Dashboard Avanzata</h1>
    <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/therapy">Terapia</a>
        <a href="/settings">Impostazioni</a>
        <a href="#" id="logout-btn">Logout</a>
    </nav>
  </header>

  <main>
    <section class="kpi-grid">
      <div class="kpi-card">
        <h3>Rischio Crisi Attuale</h3>
        <p id="current-risk">N/D</p>
      </div>
      <div class="kpi-card">
        <h3>Battito Cardiaco</h3>
        <p id="current-hr">N/D</p>
      </div>
      <div class="kpi-card">
        <h3>HRV</h3>
        <p id="current-hrv">N/D</p>
      </div>
    </section>

    <section class="chart-container">
      <h2>Andamento Rischio Crisi</h2>
            <div style="display:flex; flex-wrap:wrap; gap:0.6rem; align-items:flex-end; margin-bottom:0.7rem;">
                <div>
                    <label for="v2RangeStart">Da</label>
                    <input id="v2RangeStart" type="datetime-local" class="form-control">
                </div>
                <div>
                    <label for="v2RangeEnd">A</label>
                    <input id="v2RangeEnd" type="datetime-local" class="form-control">
                </div>
                <button id="v2ApplyRangeBtn" class="btn btn-outline" type="button">Applica intervallo</button>
                <button id="v2ResetRangeBtn" class="btn btn-secondary" type="button">Ultime 24h</button>
                <button id="v2ExportCsvBtn" class="btn btn-primary" type="button">Esporta CSV intervallo</button>
                <button id="v2ExportPdfBtn" class="btn btn-outline" type="button">Esporta PDF intervallo</button>
            </div>
            <p id="v2Status" class="muted"></p>
      <canvas id="risk-chart"></canvas>
            <div id="v2HistoryList" class="demo-form" style="margin-top:0.8rem;"></div>
    </section>

    <section class="chart-container">
      <h2>Analisi Fisiologica</h2>
      <canvas id="physiological-chart"></canvas>
    </section>
    
    <section class="chart-container">
      <h2>Impatto Farmaci sul Rischio</h2>
      <canvas id="medication-impact-chart"></canvas>
    </section>
  </main>

  <script src="web.js"></script>
</body>
</html>
