<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Epiguard | Sync & Install</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body data-page="app-download" class="page">
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="brand">EPIGUARD <span style="font-size:0.6rem; vertical-align:top; color:rgba(0,242,255,0.4)">SY-45</span></a>
      <nav class="nav">
        <a href="/dashboard" class="nav-link">Monitor</a>
        <a href="/login" class="nav-link">Login</a>
      </nav>
    </div>
  </header>

  <main class="container" style="text-align: center; padding-top: 50px;">
    <section class="card" style="max-width: 600px; margin: auto; padding: 40px;">
      <h1 class="risk-low" style="margin-bottom: 20px;">SYNC_MOBILE_UNIT</h1>
      <p class="muted" style="margin-bottom: 30px;">Scansiona il QR Code con il tuo smartphone per scaricare l'unità mobile (APK) e avviare il monitoraggio Wearable.</p>
      
      <div id="qrContainer" style="background: white; padding: 20px; border-radius: 4px; display: inline-block; margin-bottom: 30px;">
          <canvas id="appQrCanvas"></canvas>
      </div>
      
      <p style="font-family: var(--font-mono); font-size: 0.8rem; color: var(--neon-blue); margin-top: 10px;">
          SERVER_ENDPOINT: <span id="serverUrlDisplay">...</span>
      </p>

      <div style="margin-top: 40px;">
        <a id="directApkLink" href="/app/apk" class="btn btn-primary">DOWNLOAD_APK_DIRECT</a>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const url = window.location.origin;
        const apkUrl = url + '/app/apk';
        document.getElementById('serverUrlDisplay').textContent = url;
        
        QRCode.toCanvas(document.getElementById('appQrCanvas'), apkUrl, {
            width: 240,
            margin: 1,
            color: { dark: '#020205', light: '#ffffff' }
        }, (err) => {
            if (err) console.error(err);
            console.log('QR Code generated successfully');
        });
    });
  </script>
</body>
</html>
