<!DOCTYPE html>
<html lang="it">
<head>

  <title>Login Paziente - Epilessia Platform</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body data-page="login" class="page">
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="brand">Epilessia Platform</a>
      <nav class="nav">
        <a href="/" class="nav-link">Home</a>
        <a href="/login/provider" class="nav-link">Accesso Ente</a>
