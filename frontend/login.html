<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Epiguard | Login</title>
  <link rel="stylesheet" href="/static/style.css?v=2.0">
</head>
<body data-page="login" class="login-screen">
  <div class="login-panel">
    <h1>EPIGUARD <span class="muted">SY-45</span></h1>
    <p class="muted" style="margin-bottom: 30px;">ACCESSO AI SISTEMI DI MONITORAGGIO</p>
    
    <form id="localLoginForm" style="text-align: left; margin-bottom: 30px;">
        <div class="form-group" style="margin-bottom: 15px;">
            <label class="muted" style="font-size: 0.7rem;">TERMINAL_ID (EMAIL)</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="EMAIL" required>
        </div>
        <div class="form-group" style="margin-bottom: 25px;">
            <label class="muted" style="font-size: 0.7rem;">SECURITY_KEY (PASSWORD)</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="PASSWORD" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">AUTHENTICATE</button>
    </form>
    
    <div style="margin: 20px 0; border-top: 1px solid rgba(0, 242, 255, 0.1); padding-top: 20px;">
        <p class="muted">BACKUP_AUTH</p>
        <div id="googlePatientButton" style="margin-top: 10px;"></div>
    </div>

    <div id="loginError" class="risk-high hidden" style="margin-top: 20px; font-size: 0.8rem;"></div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="/static/web.js?v=2.0"></script>
</body>
</html>
