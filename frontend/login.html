<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accedi - Epilessia Platform</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body data-page="login" class="page">
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="brand">🧠 Epilessia Platform</a>
      <nav class="nav">
        <a href="/app" class="nav-link">Scarica app</a>
        <a href="/login" class="nav-link" data-nav-login>Accedi</a>
        <button class="btn btn-secondary hidden" data-nav-logout>Esci</button>
        <span class="nav-link hidden" data-user-badge></span>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-head">
      <h1>Accedi</h1>
      <p class="muted">Scegli il tuo percorso di accesso.</p>
    </section>

    <section class="login-grid">
      <article class="card">
        <h3>Paziente / Caregiver</h3>
        <p class="muted">Uso personale</p>
        <div id="googlePatientButton" class="google-box"></div>
        <div id="patientLocalLoginWrap" class="hidden" style="margin-top:12px;">
          <p class="muted" style="margin-bottom:8px;">Fallback locale (sviluppo)</p>
          <form id="patientLocalLoginForm">
            <label>Email
              <input id="patientUsername" class="input" type="text" value="demo.user@epilepsy.local" required>
            </label>
            <label>Password
              <input id="patientPassword" class="input" type="password" value="DemoUser2026!" required>
            </label>
            <button type="submit" class="btn btn-outline" style="margin-top:10px;">Accedi locale</button>
          </form>
        </div>
      </article>
      <article class="card">
        <h3>Ente sanitario</h3>
        <p class="muted">Solo per enti verificati</p>
        <a href="/login/provider" class="btn btn-outline">Accesso riservato</a>
      </article>
    </section>

    <div id="loginError" class="alert"></div>
  </main>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="/static/web.js"></script>
</body>
</html>
