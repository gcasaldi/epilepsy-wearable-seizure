<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pazienti Ente - Epiguard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="provider-patients" class="page">
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="brand">🧠 Epiguard</a>
      <nav class="nav">
        <a href="/provider/dashboard" class="nav-link">Dashboard Ente</a>
        <a href="/provider/patients" class="nav-link">Pazienti</a>
        <a href="/provider/invites" class="nav-link">Inviti</a>
        <a href="/provider/audit" class="nav-link">Audit</a>
        <button class="btn btn-secondary hidden" data-nav-logout>Esci</button>
        <span class="nav-link hidden" data-user-badge></span>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-head">
      <h1>Pazienti collegati</h1>
      <p class="muted">Organizzazione: <strong data-org-name></strong> · accesso solo con consenso attivo.</p>
    </section>

    <section class="card">
      <h3>Filtri</h3>
      <div class="form-row">
        <label>Ricerca paziente<input class="input" type="text" placeholder="Nome o ID"></label>
        <label>Stato consenso
          <select class="input">
            <option>Attivo</option>
            <option>Revocato</option>
          </select>
        </label>
      </div>
    </section>

    <section class="section card">
      <table class="table">
        <thead><tr><th>Paziente</th><th>Consenso</th><th>Trend</th></tr></thead>
        <tbody id="patientsBody"></tbody>
      </table>
    </section>
  </main>

  <script src="web.js"></script>
</body>
</html>
